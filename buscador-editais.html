<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar de Contratos — Seguro Garantia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f; --surface: #111418; --surface2: #181c22; --border: #232830;
    --accent: #00e5a0; --accent2: #0077ff; --warn: #ff9500;
    --text: #e8edf3; --muted: #5a6478; --muted2: #8a95a8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }

  header { border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; background: var(--surface); position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }
  .badge { font-family: 'DM Mono', monospace; font-size: 11px; background: rgba(0,229,160,0.1); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); padding: 4px 10px; border-radius: 20px; }

  main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

  .search-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
  .search-title { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--muted2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  .filters-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; color: var(--muted2); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }
  input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 10px 14px; outline: none; transition: border-color 0.2s; width: 100%; }
  input:focus { border-color: var(--accent); }

  .btn-search { background: var(--accent); color: #000; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; padding: 10px 28px; cursor: pointer; transition: opacity 0.2s; height: 40px; white-space: nowrap; }
  .btn-search:hover { opacity: 0.85; }
  .btn-search:disabled { opacity: 0.4; cursor: not-allowed; }

  .stats-bar { display: flex; gap: 16px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 20px; flex: 1; }
  .stat-label { font-size: 11px; color: var(--muted2); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 800; color: var(--accent); }
  .stat-value.blue { color: var(--accent2); }
  .stat-value.orange { color: var(--warn); }

  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .results-count { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted2); }
  .btn-export { background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted2); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; padding: 7px 16px; cursor: pointer; transition: all 0.2s; display: none; }
  .btn-export:hover { border-color: var(--accent); color: var(--accent); }
  .btn-export.visible { display: block; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); border-bottom: 1px solid var(--border); }
  th { padding: 12px 16px; text-align: left; font-size: 11px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted2); font-weight: 500; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--accent); }
  td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .empresa-nome { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
  .empresa-cnpj { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted2); }
  .orgao-nome { font-size: 12px; color: var(--muted2); }
  .objeto-text { font-size: 12px; color: var(--muted2); line-height: 1.5; max-width: 280px; }
  .valor { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent); white-space: nowrap; }
  .valor-garantia { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--warn); margin-top: 3px; }
  .data-col { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted2); white-space: nowrap; }

  .btn-prospectar { background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.2); border-radius: 6px; color: var(--accent); font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600; padding: 6px 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .btn-prospectar:hover { background: rgba(0,229,160,0.2); border-color: var(--accent); }

  .loading { text-align: center; padding: 60px 20px; color: var(--muted2); font-family: 'DM Mono', monospace; }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .sentinel { height: 80px; display: flex; align-items: center; justify-content: center; }
  .load-more { display: none; align-items: center; gap: 10px; color: var(--muted2); font-family: 'DM Mono', monospace; font-size: 12px; }
  .load-more.active { display: flex; }
  .load-more .spinner { width: 18px; height: 18px; margin: 0; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; line-height: 1.8; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 90%; max-width: 540px; position: relative; animation: modalIn 0.2s ease; }
  @keyframes modalIn { from { opacity:0; transform:translateY(10px) scale(0.97); } to { opacity:1; transform:none; } }
  .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--muted2); font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
  .modal h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
  .modal-sub { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted2); margin-bottom: 20px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; margin-bottom: 6px; }
  .modal-field input, .modal-field textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 10px 14px; outline: none; resize: vertical; }
  .modal-field textarea { min-height: 120px; line-height: 1.5; }
  .modal-field input:focus, .modal-field textarea:focus { border-color: var(--accent); }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel { background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted2); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; padding: 9px 20px; cursor: pointer; }
  .btn-copy { background: var(--accent); border: none; border-radius: 8px; color: #000; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; padding: 9px 20px; cursor: pointer; }
  .btn-copy:hover { opacity: 0.85; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: #000; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; padding: 12px 20px; border-radius: 10px; z-index: 300; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; transform: none; }

  @media (max-width: 768px) {
    .filters-grid { grid-template-columns: 1fr 1fr; }
    .btn-search { grid-column: span 2; }
    .stats-bar { flex-wrap: wrap; }
    th:nth-child(3), td:nth-child(3), th:nth-child(4), td:nth-child(4) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">Radar<span>Garantia</span></div>
  </div>
  <div class="badge">PNCP · DADOS AO VIVO</div>
</header>

<main>
  <div class="search-section">
    <div class="search-title">🔎 Buscar contratos homologados</div>
    <div class="filters-grid">
      <div class="field">
        <label>Data inicial</label>
        <input type="date" id="dataInicial">
      </div>
      <div class="field">
        <label>Data final</label>
        <input type="date" id="dataFinal">
      </div>
      <div class="field">
        <label>Valor mínimo (R$)</label>
        <input type="text" id="valorMin" placeholder="1.000.000" oninput="mascaraValor(this)">
      </div>
      <button class="btn-search" id="btnBuscar" onclick="buscarContratos()">⚡ Buscar</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Contratos carregados</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Valor total</div>
      <div class="stat-value blue" id="statValor">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Prêmio estimado (5%)</div>
      <div class="stat-value orange" id="statPremio">—</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="results-count" id="resultsCount"></div>
    <button class="btn-export" id="btnExport" onclick="exportarCSV()">↓ Exportar CSV</button>
  </div>

  <div class="table-wrap">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🏛️</div>
      <div class="empty-text">Selecione um período e clique em Buscar</div>
    </div>
    <div class="loading" id="loadingState" style="display:none">
      <div><div class="spinner"></div></div>
      <div>Consultando PNCP...</div>
    </div>
    <table id="tabelaContratos" style="display:none">
      <thead>
        <tr>
          <th>Empresa</th>
          <th>Objeto</th>
          <th>Órgão</th>
          <th>Data</th>
          <th class="sortable" id="thValor" onclick="toggleOrdem()">Valor contrato ↓</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="sentinel" id="sentinel">
      <div class="load-more" id="loadMore">
        <div class="spinner"></div>
        <span>Carregando mais contratos...</span>
      </div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="fecharModal()">✕</button>
    <h2 id="modalEmpresa">—</h2>
    <div class="modal-sub" id="modalSub">—</div>
    <div class="modal-field">
      <label>Assunto</label>
      <input type="text" id="emailAssunto" readonly>
    </div>
    <div class="modal-field">
      <label>Corpo do email</label>
      <textarea id="emailCorpo"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-copy" onclick="copiarEmail()">📋 Copiar email</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Estado ────────────────────────────────────────────────────
  let todos      = [];
  let pagAtual   = 0;
  let totalPags  = 1;
  let carregando = false;
  let ordemDesc  = true;
  let valMin     = 0;
  let dIni = '', dFim = '';

  // ── Datas padrão ─────────────────────────────────────────────
  const hoje = new Date();
  const menos7 = new Date(); menos7.setDate(hoje.getDate()-7);
  document.getElementById('dataFinal').value   = iso(hoje);
  document.getElementById('dataInicial').value = iso(menos7);

  function iso(d) { return d.toISOString().split('T')[0]; }
  function apiDate(s) { return s.replace(/-/g,''); }
  function brDate(s) {
    if (!s) return '—';
    const [y,m,d] = s.substring(0,10).split('-');
    return `${d}/${m}/${y}`;
  }
  function R$(v) {
    if (!v) return '—';
    return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0}).format(v);
  }
  function cnpj(c) {
    if (!c) return '';
    const s = String(c).replace(/\D/g,'').padStart(14,'0');
    return `${s.slice(0,2)}.${s.slice(2,5)}.${s.slice(5,8)}/${s.slice(8,12)}-${s.slice(12,14)}`;
  }
  function cut(s,n) { if(!s) return '—'; return s.length>n ? s.slice(0,n)+'…':s; }

  // ── Máscara campo valor ───────────────────────────────────────
  function mascaraValor(el) {
    const n = el.value.replace(/\D/g,'');
    el.value = n ? parseInt(n,10).toLocaleString('pt-BR') : '';
  }

  function lerValMin() {
    const n = document.getElementById('valorMin').value.replace(/\D/g,'');
    return n ? parseInt(n,10) : 0;
  }

  // ── Proxies CORS ──────────────────────────────────────────────
  const PROXIES = [
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  ];

  async function fetchPNCP(url) {
    try {
      const r = await fetch(url, {signal: AbortSignal.timeout(8000)});
      if (r.ok) return r.json();
    } catch(e){}
    for (const p of PROXIES) {
      try {
        const r = await fetch(p(url), {signal: AbortSignal.timeout(12000)});
        if (r.ok) return r.json();
      } catch(e){}
    }
    throw new Error('Não foi possível conectar ao PNCP.<br><br><small>Tente abrir o arquivo via:<br><code style="background:#1a1f28;padding:2px 6px;border-radius:4px">python -m http.server 8080</code><br>e acesse <b>http://localhost:8080/buscador-editais.html</b></small>');
  }

  // ── Busca principal ───────────────────────────────────────────
  async function buscarContratos() {
    dIni = document.getElementById('dataInicial').value;
    dFim = document.getElementById('dataFinal').value;
    valMin = lerValMin();

    if (!dIni || !dFim) { toast('⚠️ Preencha as datas'); return; }

    // Reset completo
    todos = []; pagAtual = 0; totalPags = 1; carregando = false;

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('loadingState').style.display = 'block';
    document.getElementById('tabelaContratos').style.display = 'none';
    document.getElementById('btnExport').classList.remove('visible');
    document.getElementById('tbody').innerHTML = '';
    document.getElementById('statTotal').textContent = '—';
    document.getElementById('statValor').textContent = '—';
    document.getElementById('statPremio').textContent = '—';
    document.getElementById('resultsCount').textContent = '';

    const btn = document.getElementById('btnBuscar');
    btn.disabled = true; btn.textContent = 'Buscando...';

    try {
      await carregarPagina();
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('tabelaContratos').style.display = 'table';
      document.getElementById('btnExport').classList.add('visible');
    } catch(e) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('emptyState').innerHTML =
        `<div class="empty-icon">⚠️</div><div class="empty-text">${e.message}</div>`;
    }

    btn.disabled = false; btn.textContent = '⚡ Buscar';
  }

  // ── Carrega próxima página ────────────────────────────────────
  async function carregarPagina() {
    if (carregando || pagAtual >= totalPags) return;
    carregando = true;
    pagAtual++;

    if (pagAtual > 1) document.getElementById('loadMore').classList.add('active');

    const url = `https://pncp.gov.br/api/consulta/v1/contratos?dataInicial=${apiDate(dIni)}&dataFinal=${apiDate(dFim)}&pagina=${pagAtual}&tamanhoPagina=50`;
    const data = await fetchPNCP(url);

    totalPags = data.totalPaginas || 1;

    // Filtra por valor mínimo (sem máscara, valor bruto do campo)
    const novos = (data.data || []).filter(c => (c.valorInicial || 0) >= valMin);
    todos = todos.concat(novos);

    // Ordena tudo
    sortTodos();
    renderTabela();

    document.getElementById('loadMore').classList.remove('active');
    carregando = false;
  }

  // ── Ordena ────────────────────────────────────────────────────
  function sortTodos() {
    todos.sort((a,b) => ordemDesc
      ? (b.valorInicial||0) - (a.valorInicial||0)
      : (a.valorInicial||0) - (b.valorInicial||0)
    );
  }

  function toggleOrdem() {
    ordemDesc = !ordemDesc;
    document.getElementById('thValor').textContent = 'Valor contrato ' + (ordemDesc ? '↓' : '↑');
    sortTodos();
    renderTabela();
  }

  // ── Renderiza ─────────────────────────────────────────────────
  function renderTabela() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    if (!todos.length) {
      document.getElementById('tabelaContratos').style.display = 'none';
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('emptyState').innerHTML =
        `<div class="empty-icon">🔍</div><div class="empty-text">Nenhum contrato encontrado com os filtros aplicados</div>`;
      return;
    }

    document.getElementById('emptyState').style.display = 'none';

    const total = todos.reduce((s,c)=>s+(c.valorInicial||0),0);
    document.getElementById('statTotal').textContent = todos.length.toLocaleString('pt-BR');
    document.getElementById('statValor').textContent = R$(total);
    document.getElementById('statPremio').textContent = R$(total*0.05);
    document.getElementById('resultsCount').textContent =
      `${todos.length} contratos` +
      (pagAtual < totalPags ? ` · role para carregar mais` : ' · todos carregados');

    todos.forEach(c => {
      const emp    = c.nomeRazaoSocialFornecedor || 'Não informado';
      const cpj    = c.cnpjFornecedor || '';
      const obj    = c.objetoContrato || c.informacaoComplementar || '—';
      const org    = c.orgaoEntidade?.razaoSocial || c.unidadeOrgao?.nomeUnidade || '—';
      const val    = c.valorInicial || 0;
      const dt     = c.dataAssinatura || c.dataPublicacaoPncp || '';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <div class="empresa-nome">${cut(emp,40)}</div>
          <div class="empresa-cnpj">${cnpj(cpj)}</div>
        </td>
        <td><div class="objeto-text">${cut(obj,120)}</div></td>
        <td><div class="orgao-nome">${cut(org,50)}</div></td>
        <td><div class="data-col">${brDate(dt)}</div></td>
        <td>
          <div class="valor">${R$(val)}</div>
          ${val>0?`<div class="valor-garantia">Garantia ~${R$(val*0.05)}</div>`:''}
        </td>
        <td>
          <button class="btn-prospectar"
            onclick='abrirModal(${JSON.stringify({emp,cpj,obj,org,val,dt})})'>
            ✉ Prospectar
          </button>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  // ── Scroll infinito ───────────────────────────────────────────
  const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && pagAtual > 0 && pagAtual < totalPags && !carregando) {
      carregarPagina();
    }
  }, { rootMargin: '300px' });
  observer.observe(document.getElementById('sentinel'));

  // ── Modal ─────────────────────────────────────────────────────
  function abrirModal(d) {
    document.getElementById('modalEmpresa').textContent = d.emp;
    document.getElementById('modalSub').textContent =
      `CNPJ: ${cnpj(d.cpj)} · Contrato: ${R$(d.val)}`;
    document.getElementById('emailAssunto').value =
      `${d.emp} — Seguro Garantia para contrato com ${d.org}`;
    const grt = d.val > 0 ? R$(d.val*0.05) : 'aprox. 5% do valor do contrato';
    document.getElementById('emailCorpo').value =
`Olá,

Parabenizo a ${d.emp} pela conquista do contrato junto ao ${d.org}.

Para formalizar a execução, provavelmente será necessário apresentar Seguro Garantia de Execução Contratual — exigência prevista na Lei nº 14.133/2021.

Sou especialista em Seguro Garantia e posso:
• Cotar com as principais seguradoras (Tokio Marine, Porto Seguro, Zurich) em menos de 24h
• Emitir a apólice digitalmente, sem burocracia
• Custo estimado a partir de ${grt}

Posso reservar 15 minutos para apresentar as opções?

[Inserir link da sua agenda]

Atenciosamente,
[Seu nome]
[Sua corretora] | SUSEP: [número]
[Telefone]`;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function fecharModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function copiarEmail() {
    const txt = `Assunto: ${document.getElementById('emailAssunto').value}\n\n${document.getElementById('emailCorpo').value}`;
    navigator.clipboard.writeText(txt).then(() => { toast('✓ Email copiado!'); fecharModal(); });
  }

  // ── Export CSV ────────────────────────────────────────────────
  function exportarCSV() {
    if (!todos.length) return;
    const h = ['Empresa','CNPJ','Objeto','Órgão','Valor (R$)','Garantia Est. (R$)','Data'];
    const rows = todos.map(c => [
      c.nomeRazaoSocialFornecedor||'',
      cnpj(c.cnpjFornecedor||''),
      (c.objetoContrato||'').replace(/"/g,'""'),
      c.orgaoEntidade?.razaoSocial || c.unidadeOrgao?.nomeUnidade || '',
      (c.valorInicial||0).toFixed(2),
      ((c.valorInicial||0)*0.05).toFixed(2),
      brDate(c.dataAssinatura||c.dataPublicacaoPncp||'')
    ]);
    const csv = [h,...rows].map(r=>r.map(v=>`"${v}"`).join(';')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
    a.download = `contratos_${iso(new Date())}.csv`;
    a.click();
    toast('✓ CSV exportado!');
  }

  // ── Utilitários ───────────────────────────────────────────────
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2800);
  }

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) fecharModal();
  });
</script>
</body>
</html>
